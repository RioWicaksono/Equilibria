<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Minimalist abstract geometric 'E' representing a balanced scale / structure -->
  <rect width="256" height="256" fill="#0c0a09" rx="32" />
  
  <!-- Structure of the 'E' / chart bars -->
  <!-- Bottom Bar (Foundation) -->
  <rect x="56" y="176" width="144" height="24" fill="#f5f5f4" rx="4" />
  
  <!-- Middle Bar (Balance) -->
  <rect x="56" y="116" width="96" height="24" fill="#f5f5f4" rx="4" />
  <circle cx="180" cy="128" r="12" fill="#d6d3d1" />
  
  <!-- Top Bar (Growth) -->
  <rect x="56" y="56" width="144" height="24" fill="#f5f5f4" rx="4" />
  <polygon points="176,56 224,56 224,32" fill="#d6d3d1" />

  <!-- Vertical Connecting Spine / Flow -->
  <rect x="56" y="56" width="24" height="144" fill="#f5f5f4" rx="4" />
</svg>
